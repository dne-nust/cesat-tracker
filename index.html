/* ─── Helpers ────────────────────────────────────────────────────────────── */
const {useState, useMemo} = React;

function sevBadge(sev) {
  const map = { Critical:'badge-red', High:'badge-orange', Medium:'badge-yellow', Low:'badge-green' };
  return <span className={`badge ${map[sev]||'badge-gray'}`}>{sev}</span>;
}
function statusBadge(s) {
  const map = {
    'IN PROGRESS':'badge-blue', 'NOT STARTED':'badge-gray',
    'OPEN':'badge-orange', 'APPLIED':'badge-blue', 'CLOSED':'badge-green',
    'MITIGATED':'badge-green', 'AUTOMATED':'badge-green', 'MONITOR':'badge-yellow',
    'ONGOING':'badge-yellow', 'VERIFIED':'badge-green',
  };
  return <span className={`badge ${map[s]||'badge-gray'}`}>{s}</span>;
}
function taskStatusBadge(s) {
  return <span className={`badge ${STATUS_COLORS[s]||'badge-gray'}`}>{s}</span>;
}
function milestoneBadge(m) {
  const colors = { M1:'badge-blue', M2:'badge-blue', M3:'badge-green', M4:'badge-orange', M5:'badge-purple' };
  return <span className={`badge ${colors[m]||'badge-gray'}`}>{m}</span>;
}
function daysUntil(dateStr) {
  const today = new Date('2026-03-18');
  const target = new Date(dateStr);
  return Math.ceil((target - today) / (1000*60*60*24));
}

/* ─── StatusSummaryBar ───────────────────────────────────────────────────── */
function StatusSummaryBar({ tasks }) {
  const done     = tasks.filter(t => t.status === 'Done').length;
  const inProg   = tasks.filter(t => t.status === 'In Progress').length;
  const blocked  = tasks.filter(t => t.status === 'Blocked').length;
  const backlog  = tasks.filter(t => t.status === 'Backlog').length;
  const total    = tasks.length;

/* ─── TaskDetailPanel ────────────────────────────────────────────────────── */
function TaskDetailPanel({ task, onClose, onUpdate }) {
  const [status, setStatus] = useState(task.status);
  const [notes,  setNotes]  = useState(task.notes);

  function handleStatusChange(e) {
    const newStatus = e.target.value;
    setStatus(newStatus);
    onUpdate(task.id, { status: newStatus, notes });
  }
  function handleNotesChange(e) {
    const newNotes = e.target.value;
    setNotes(newNotes);
    onUpdate(task.id, { status, notes: newNotes });
  }

  return (
    <div className="modal-overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-panel">
        <h3>Task {task.id}</h3>
        <div className="modal-field">
          <label>NAME</label>
          <div className="val">{task.name}</div>
        </div>
        <div className="modal-field">
          <label>PHASE / MILESTONE</label>
          <div className="val">Phase {task.phase} &nbsp;·&nbsp; {milestoneBadge(task.milestone)}</div>
        </div>
        <div className="modal-field">
          <label>OWNER</label>
          <div className="val">{task.owner}</div>
        </div>
        <div className="modal-field">
          <label>EFFORT</label>
          <div className="val">{task.effort}</div>
        </div>
        <div className="modal-field">
          <label>START → DUE</label>
          <div className="val">{task.start} → {task.due}</div>
        </div>
        {task.depends && (
          <div className="modal-field">
            <label>DEPENDS ON</label>
            <div className="val" style={{fontFamily:'monospace',fontSize:12}}>{task.depends}</div>
          </div>
        )}
        {task.oi && (
          <div className="modal-field">
            <label>BLOCKING OPEN ITEMS</label>
            <div className="val" style={{color:'#8B4513',fontWeight:'bold'}}>⚠️ {task.oi}</div>
          </div>
        )}
        <div className="modal-field">
          <label>STATUS</label>
          <select value={status} onChange={handleStatusChange}>
            {ALL_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div className="modal-field">
          <label>NOTES</label>
          <textarea value={notes} onChange={handleNotesChange} placeholder="Add notes…"/>
        </div>
        <button className="modal-close" onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

/* ─── WBS View ───────────────────────────────────────────────────────────── */
function WBS({ tasks, onSelectTask }) {
  const totalDone = tasks.filter(t => t.status === 'Done').length;
  const totalPct  = tasks.length ? Math.round(100 * totalDone / tasks.length) : 0;
  const phases    = [1, 2, 3, 4, 5];

  return (
    <section>
      <h2>Work Breakdown Structure</h2>

      <div className="wbs-banner">
        ℹ️ <strong>Option A — Session-only status tracking.</strong> Status changes made here are
        visible for this browser session only. To save permanently, ask Claude Code to commit the
        updated statuses to <code>index.html</code>.
      </div>

      <div className="wbs-overall">
        <div className="lbl">Overall project progress (tasks marked Done)</div>
        <div style={{display:'flex',alignItems:'center',gap:16,marginTop:6}}>
          <div className="pct">{totalPct}%</div>
          <div style={{flex:1}}>
            <div className="progress-wrap" style={{height:12}}>
              <div className="progress-bar" style={{width:totalPct+'%', height:12}}/>
            </div>
          </div>
          <div style={{fontSize:13,color:'#555'}}>{totalDone} / {tasks.length} tasks done</div>
        </div>
      </div>

      {phases.map(ph => {
        const pTasks  = tasks.filter(t => t.phase === ph);
        const pDone   = pTasks.filter(t => t.status === 'Done').length;
        const pInProg = pTasks.filter(t => t.status === 'In Progress').length;
        const pBlock  = pTasks.filter(t => t.status === 'Blocked').length;
        const pPct    = pTasks.length ? Math.round(100 * pDone / pTasks.length) : 0;
        const bg      = PHASE_COLORS[ph];
        const tc      = PHASE_TEXT[ph];

        return (
          <div key={ph}>
            <div className="phase-header" style={{background:bg}}>
              <span className="phase-name" style={{color:tc}}>{PHASE_NAMES[ph]}</span>
              <span style={{fontSize:12,color:tc,opacity:0.8}}>{pTasks.length} tasks</span>
              <span className="badge badge-green" style={{fontSize:11}}>Done: {pDone}</span>
              {pInProg>0 && <span className="badge badge-blue" style={{fontSize:11}}>In Progress: {pInProg}</span>}
              {pBlock>0  && <span className="badge badge-red"  style={{fontSize:11}}>Blocked: {pBlock}</span>}
              <div className="phase-mini-bar">
                <div className="phase-mini-fill" style={{width:pPct+'%', background:tc, opacity:0.7}}/>
              </div>
              <span style={{fontSize:12,fontWeight:'bold',color:tc,minWidth:32}}>{pPct}%</span>
            </div>

            <table>
              <thead>
                <tr>
                  <th style={{width:70}}>ID</th>
                  <th>Task</th>
                  <th style={{width:60}}>Effort</th>
                  <th style={{width:160}}>Owner</th>
                  <th style={{width:55}}>MS</th>
                  <th style={{width:55}}>OI</th>
                  <th style={{width:100}}>Status</th>
                  <th style={{width:140}}>Depends On</th>
                </tr>
              </thead>
              <tbody>
                {pTasks.map(t => (
                  <tr key={t.id} className="wbs-task-row" onClick={() => onSelectTask(t)}>
                    <td>
                      <span className="task-id" style={{color:PHASE_TEXT[ph]}}>{t.id}</span>
                    </td>
                    <td style={{fontSize:12}}>{t.name}</td>
                    <td style={{fontSize:11,whiteSpace:'nowrap'}}>{t.effort}</td>
                    <td style={{fontSize:11}}>{t.owner}</td>
                    <td>{milestoneBadge(t.milestone)}</td>
                    <td>
                      {t.oi
                        ? <span className="oi-warn" title={t.oi}>⚠️ {t.oi}</span>
                        : <span style={{color:'#ccc',fontSize:11}}>—</span>}
                    </td>
                    <td>{taskStatusBadge(t.status)}</td>
                    <td style={{fontSize:11,color:'#888',fontFamily:'monospace'}}>{t.depends||'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      })}
    </section>
  );
}

              <td style={{fontSize:12}}>{o.owner}</td>
              <td style={{whiteSpace:'nowrap',fontSize:12}}>{o.target}</td>
              <td>{statusBadge(o.status)}</td>
              <td style={{fontSize:12}}>{o.blocks}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </section>
  );
}

function Risks() {
  const [showClosed, setShowClosed] = useState(false);
  const visible = showClosed ? DATA.risks : DATA.risks.filter(r => r.status !== 'CLOSED');
  return (
    <section>
      <h2>Risk Register</h2>
      <div style={{marginBottom:10}}>
        <label style={{fontSize:13,cursor:'pointer'}}>
          <input type="checkbox" checked={showClosed} onChange={e=>setShowClosed(e.target.checked)} style={{marginRight:6}}/>
          Show closed risks
        </label>
      </div>
      <table>
        <thead><tr><th>ID</th><th>Description</th><th>Severity</th><th>Type</th><th>Status</th><th>Mitigation</th></tr></thead>
        <tbody>
          {visible.map(r => (
            <tr key={r.id}>
              <td><b style={{color:'#1F4E79'}}>{r.id}</b></td>
              <td>{r.desc}</td>
              <td>{sevBadge(r.sev)}</td>
              <td><span className={`badge ${r.hw?'badge-blue':'badge-yellow'}`}>{r.hw?'HW':'SW'}</span></td>
              <td>{statusBadge(r.status)}</td>
              <td style={{fontSize:12}}>{r.note}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </section>
  );
}

/* ─── App Shell ───────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab]             = useState('dashboard');
  const [tasks, setTasks]         = useState(SEED_TASKS);
  const [selectedTask, setSelected] = useState(null);

  const tabs = [
    {id:'dashboard',  label:'Dashboard'},
    {id:'milestones', label:'Milestones'},
    {id:'openitems',  label:'Open Items'},
    {id:'risks',      label:'Risk Register'},
    {id:'wbs',        label:'WBS'},
  ];

  function handleTaskUpdate(id, changes) {
    setTasks(prev => prev.map(t => t.id === id ? {...t, ...changes} : t));
  }

  function openTask(t) {
    // find the live task from state (has latest status)
    const live = tasks.find(x => x.id === t.id) || t;
    setSelected(live);
  }

  return (
    <div>
      <header>
        <h1>CESAT/NUST — FPGA-Enhanced FMUv6X Project Tracker</h1>
        <p>STM32H753 + XC7S25 FPGA | DS-012 Rev5 + CESAT Extensions | Seed data: PP v2.6, HEP v6.0, SDP v1.5</p>
      </header>
      <nav>
        {tabs.map(t => (
          <button key={t.id} className={tab===t.id?'active':''} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </nav>

      <StatusSummaryBar tasks={tasks} />

      <main>
        {tab==='dashboard'  && <Dashboard/>}
        {tab==='milestones' && <Milestones/>}
        {tab==='openitems'  && <OpenItems/>}
        {tab==='risks'      && <Risks/>}
        {tab==='wbs'        && <WBS tasks={tasks} onSelectTask={openTask}/>}
      </main>

      {selectedTask && (
        <TaskDetailPanel
          task={tasks.find(t => t.id === selectedTask.id) || selectedTask}
          onClose={() => setSelected(null)}
          onUpdate={handleTaskUpdate}
        />
      )}

      <footer>
        CESAT/NUST Islamabad &nbsp;|&nbsp; Data last updated: 2026-03-18 &nbsp;|&nbsp;
        <a href="https://github.com/dne-nust" style={{color:'#2E75B6'}}>github.com/dne-nust</a>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
